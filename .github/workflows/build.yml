name: 构建万象Chat全平台

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_android:
        description: '构建 Android'
        required: false
        default: true
        type: boolean
      build_desktop:
        description: '构建桌面端'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ====== Android ======
  build-android:
    if: >-
      ${{ github.event_name != 'workflow_dispatch' || inputs.build_android == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 安装依赖
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: pnpm install --no-frozen-lockfile

      - name: 构建 Web 版本
        env:
          CHATBOX_BUILD_PLATFORM: web
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: npx cross-env CHATBOX_BUILD_PLATFORM=web npx electron-vite build

      - name: 配置 Capacitor + Android
        run: |
          npx cap add android 2>/dev/null || echo "project exists"
          npx cap sync android
          npx cap copy android

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 构建 Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: 构建 Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: 构建 Google Play AAB
        working-directory: android
        run: ./gradlew bundleRelease

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: 上传 Release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: 上传 Google Play AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-googleplay-aab
          path: android/app/build/outputs/bundle/release/*.aab

  # ====== 桌面端 Linux + Windows ======
  build-desktop-linux-win:
    if: >-
      ${{ github.event_name != 'workflow_dispatch' || inputs.build_desktop == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 安装依赖
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: pnpm install --no-frozen-lockfile

      - name: 构建 Electron 应用
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: npx electron-vite build

      - name: 安装 Wine (Windows 交叉构建)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq wine64 wine32 2>/dev/null || echo "wine32 skipped"

      - name: 构建 Linux AppImage + deb
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder build --linux --publish=never

      - name: 构建 Windows exe
        continue-on-error: true
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder build --win --publish=never

      - name: 上传 Linux AppImage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/build/*.AppImage

      - name: 上传 Linux deb
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release/build/*.deb

      - name: 上传 Windows exe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: release/build/*.exe

  # ====== 桌面端 macOS ======
  build-desktop-mac:
    if: >-
      ${{ github.event_name != 'workflow_dispatch' || inputs.build_desktop == true }}
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 安装依赖
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: pnpm install --no-frozen-lockfile

      - name: 构建 Electron 应用
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: npx electron-vite build

      - name: 构建 macOS dmg
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder build --mac --publish=never

      - name: 上传 macOS dmg
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release/build/*.dmg
