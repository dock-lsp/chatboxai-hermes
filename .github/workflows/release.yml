name: 发布 Release

on:
  workflow_run:
    workflows: ['构建万象Chat全平台']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  release:
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 列出产物文件
        run: find artifacts -type f \( -name "*.apk" -o -name "*.aab" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.exe" -o -name "*.dmg" \) | sort

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "万象Chat v${{ github.event.workflow_run.run_number }}"
          tag_name: "v${{ github.event.workflow_run.run_number }}"
          body: |
            ## 万象Chat + Hermes AI Agent — 开源多平台 AI 聊天客户端

            构建编号: #${{ github.event.workflow_run.run_number }}
            触发 commit: [${{ github.event.workflow_run.head_sha }}](https://github.com/dock-lsp/chatboxai-hermes/commit/${{ github.event.workflow_run.head_sha }})

            ### ✨ 新增功能
            - **持久化记忆系统** — AI 自动提取并记住用户偏好、事实和上下文
            - **技能系统 (Skills)** — AI 从复杂任务中创建可复用技能，持续自我改进
            - **子代理委派** — AI 自动拆分复杂任务为并行子任务

            ### 📱 移动端
            - `android-debug-apk` — Debug 版本
            - `android-release-apk` — Release 版本
            - `android-googleplay-aab` — Google Play 上架用

            ### 💻 桌面端
            - `windows-exe` — Windows 安装包
            - `linux-appimage` — Linux AppImage
            - `linux-deb` — Linux deb 安装包
            - `macos-dmg` — macOS 安装包
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.exe
            artifacts/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
