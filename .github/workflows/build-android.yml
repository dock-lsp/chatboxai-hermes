name: 构建万象Chat 全平台

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  # ====== Android / 鸿蒙 / 谷歌 ======
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: 安装 pnpm
        run: npm install -g pnpm

      - name: 安装依赖
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          npm_config_build_from_source: 'false'
        run: pnpm install --no-frozen-lockfile

      - name: 构建 Web 版本
        env:
          CHATBOX_BUILD_PLATFORM: web
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: npx cross-env CHATBOX_BUILD_PLATFORM=web npx electron-vite build

      - name: 配置 Capacitor + Android
        run: |
          npx cap add android 2>/dev/null || echo "project exists"
          npx cap sync android
          npx cap copy android

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 构建 Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: 构建 Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: 构建 Google Play AAB
        working-directory: android
        run: ./gradlew bundleRelease

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: 万象Chat-Debug-APK
          path: android/app/build/outputs/apk/debug/*.apk

      - name: 上传 Release APK
        uses: actions/upload-artifact@v4
        with:
          name: 万象Chat-Release-APK
          path: android/app/build/outputs/apk/release/*.apk

      - name: 上传 Google Play AAB
        uses: actions/upload-artifact@v4
        with:
          name: 万象Chat-GooglePlay-AAB
          path: android/app/build/outputs/bundle/release/*.aab

  # ====== 桌面端 (Windows + Linux) ======
  build-desktop:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: 安装 pnpm
        run: npm install -g pnpm

      - name: 安装依赖
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          npm_config_build_from_source: 'false'
        run: pnpm install --no-frozen-lockfile

      - name: 构建 Electron 应用
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: npx electron-vite build

      - name: 安装 Wine (Windows 交叉构建需要)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq wine64 wine32 2>/dev/null || echo "wine32 跳过"

      - name: 构建 Linux 版本
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          UPDATE_CHANNEL: 'latest'
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder build --linux --publish=never

      - name: 构建 Windows 版本
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          UPDATE_CHANNEL: 'latest'
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder build --win --publish=never

      - name: 上传 Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: 万象Chat-Linux
          path: release/build/*.AppImage

      - name: 上传 Linux deb
        uses: actions/upload-artifact@v4
        with:
          name: 万象Chat-Linux-deb
          path: release/build/*.deb

      - name: 上传 Windows 安装包
        uses: actions/upload-artifact@v4
        with:
          name: 万象Chat-Windows
          path: release/build/*.exe

  # ====== 创建 Release ======
  create-release:
    needs: [build-android, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4

      - name: 列出产物
        run: find . -type f \( -name "*.apk" -o -name "*.aab" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.exe" \) | sort

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "万象Chat v${{ github.run_number }}"
          tag_name: "v${{ github.run_number }}"
          body: |
            ## 万象Chat — 永久免费 AI 桌面客户端

            - 构建编号: #${{ github.run_number }}
            - 已移除所有付费限制，永久免费

            ### 📱 移动端
            - `万象Chat-Debug-APK` — Debug 版本 (鸿蒙/Android 通用)
            - `万象Chat-Release-APK` — Release 版本
            - `万象Chat-GooglePlay-AAB` — Google Play 上架用

            ### 💻 桌面端
            - `万象Chat-Windows` — Windows 安装包 (.exe)
            - `万象Chat-Linux` — Linux AppImage (.AppImage)
            - `万象Chat-Linux-deb` — Linux 安装包 (.deb)
          files: |
            **/*.apk
            **/*.aab
            **/*.AppImage
            **/*.deb
            **/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
