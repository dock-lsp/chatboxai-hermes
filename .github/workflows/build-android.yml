name: 构建万象Chat Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: 安装 pnpm
        run: npm install -g pnpm

      - name: 安装依赖
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          npm_config_build_from_source: 'false'
        run: pnpm install --no-frozen-lockfile

      - name: 构建 Web 版本
        env:
          CHATBOX_BUILD_PLATFORM: web
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: npx cross-env CHATBOX_BUILD_PLATFORM=web npx electron-vite build

      - name: 配置 Capacitor + Android
        run: |
          npx cap add android 2>/dev/null || echo "Android project exists"
          npx cap sync android
          npx cap copy android

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 构建 Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: 构建 Release APK（未签名）
        working-directory: android
        run: ./gradlew assembleRelease

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wanxiang-debug
          path: android/app/build/outputs/apk/debug/*.apk

      - name: 上传 Release APK
        uses: actions/upload-artifact@v4
        with:
          name: wanxiang-release
          path: android/app/build/outputs/apk/release/*.apk

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "万象Chat v${{ github.run_number }}"
          tag_name: "v${{ github.run_number }}"
          body: |
            ## 万象Chat Android APK

            - 构建编号: #${{ github.run_number }}
            - Commit: ${{ github.sha }}
            - 永久免费，无付费限制

            ### 下载
            - `wanxiang-debug.apk` — Debug 版本（可直接安装）
            - `wanxiang-release.apk` — Release 版本（未签名）
          files: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建摘要
        run: |
          echo "### ✅ 万象Chat Android APK 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 Release 下载: ${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
