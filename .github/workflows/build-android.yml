name: 构建万象Chat Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装 pnpm
        run: npm install -g pnpm@10

      - name: 安装依赖
        run: pnpm install --no-frozen-lockfile

      - name: 构建 Web 版本
        run: pnpm run build:web

      - name: 配置 Capacitor + Android
        run: |
          npx cap add android 2>/dev/null || echo "Android project exists"
          npx cap sync android
          npx cap copy android

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 构建 Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: 构建 Release APK（未签名）
        working-directory: android
        run: ./gradlew assembleRelease

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wanxiang-debug
          path: android/app/build/outputs/apk/debug/*.apk

      - name: 上传 Release APK
        uses: actions/upload-artifact@v4
        with:
          name: wanxiang-release
          path: android/app/build/outputs/apk/release/*.apk

      - name: 构建摘要
        run: |
          echo "### ✅ 万象Chat Android APK 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "- Debug APK: \`android/app/build/outputs/apk/debug/\`" >> $GITHUB_STEP_SUMMARY
          echo "- Release APK: \`android/app/build/outputs/apk/release/\`" >> $GITHUB_STEP_SUMMARY
